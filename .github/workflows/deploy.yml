name: Deploy to Coolify

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm run test
      - name: Build
        run: npm run build
      - name: Trigger Coolify Deploy
        run: |
          curl -X GET "http://187.77.26.99:8000/api/v1/deploy?uuid=y8o0oksoksw4owc0kkg40g08&force=true" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"
